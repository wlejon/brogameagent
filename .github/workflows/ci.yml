name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# brogameagent depends on two siblings: the header-only bromath and brotensor
# (the host Tensor type + CPU op backend, a hard dependency of the NN/learning
# layer). CI builds the default configuration — BROGAMEAGENT_WITH_NN=ON,
# GPU backends OFF — so brotensor is pulled in CPU-only. Every job reconstructs
# the sibling layout:
#
#   $GITHUB_WORKSPACE/
#     brogameagent/  <- this repo, checked out into a named path
#     bromath/
#     brotensor/
#
# Ninja on Linux/macOS: `cmake --build --parallel` with no count passes a bare
# `-j` to make (unbounded), which oversubscribes the small hosted runners once
# brotensor's op TUs are in the build. Ninja bounds concurrency; the job counts
# are pinned anyway. Windows keeps the VS generator (MSBuild /m is bounded).
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-gcc,    os: ubuntu-24.04, cc: gcc,   cxx: g++ }
          - { name: linux-clang,  os: ubuntu-24.04, cc: clang, cxx: clang++ }
          - { name: windows-msvc, os: windows-2022 }
          - { name: macos-arm64,  os: macos-14 }
    steps:
      - uses: actions/checkout@v7
        with:
          path: brogameagent

      - uses: actions/checkout@v7
        with:
          repository: wlejon/bromath
          path: bromath

      - uses: actions/checkout@v7
        with:
          repository: wlejon/brotensor
          path: brotensor

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -S brogameagent -B build -DCMAKE_BUILD_TYPE=Release
          else
            cmake -S brogameagent -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # ── Coverage ──────────────────────────────────────────────────────────────
  #
  # Debug + --coverage on Linux. --filter scopes the numbers to brogameagent's
  # own code (include/brogameagent/ + src/); the bromath and brotensor siblings
  # are excluded.
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          path: brogameagent

      - uses: actions/checkout@v7
        with:
          repository: wlejon/bromath
          path: bromath

      - uses: actions/checkout@v7
        with:
          repository: wlejon/brotensor
          path: brotensor

      - name: Install gcovr + Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcovr ninja-build

      - name: Configure (instrumented)
        run: |
          cmake -S brogameagent -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel 4

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # pipefail: piping gcovr into tee otherwise hands the step tee's exit
      # status, so a gcovr crash produces no report and the job still goes green.
      # negative_hits: tight training loops overflow gcov's branch counters into
      # negatives (gcc bug 68080); downgrade that to a per-file warning.
      - name: Report
        shell: bash
        run: |
          set -o pipefail
          mkdir -p coverage-html
          gcovr --root . \
            --filter 'brogameagent/include/brogameagent/' --filter 'brogameagent/src/' \
            --exclude-unreachable-branches \
            --gcov-ignore-errors=no_working_dir_found \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --print-summary \
            --html-details coverage-html/index.html \
            | tee coverage-summary.txt
          test -s coverage-html/index.html

      - name: Job summary
        if: always()
        run: |
          {
            echo '## Coverage — `include/brogameagent/` + `src/`'
            echo
            echo 'The bromath and brotensor siblings are filtered out.'
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14
